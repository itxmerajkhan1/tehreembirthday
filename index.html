<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Safeguard to prevent crashing if third-party libraries or sandboxes attempt to override read-only window.fetch
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return customFetch;
            },
            set: function(newFetch) {
              customFetch = newFetch;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // Dynamic fallback if Object.defineProperty is locked
          try {
            window.fetch = window.fetch;
          } catch (err) {}
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEHREEM BIRTHDAY</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
